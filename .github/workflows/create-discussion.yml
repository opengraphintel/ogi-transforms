name: Create Discussion for New Transform

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "transforms/**/plugin.yaml"

permissions:
  contents: read
  discussions: write

jobs:
  create-discussion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new transforms
        id: new-transforms
        run: |
          NEW_MANIFESTS=$(git diff --name-only HEAD~1 HEAD -- 'transforms/**/plugin.yaml' | head -10)
          echo "manifests=$NEW_MANIFESTS" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create discussions
        if: steps.new-transforms.outputs.manifests != ''
        env:
          GH_TOKEN: ${{ secrets.DISCUSSIONS_TOKEN }}
          DISCUSSION_CATEGORY: Transforms
        run: |
          pip install pyyaml
          python -c "
          import yaml, subprocess, json, os, sys
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          category_name = os.environ['DISCUSSION_CATEGORY']

          # Fetch repository ID and discussion category ID
          query = '''
          query(\$owner: String!, \$name: String!) {
            repository(owner: \$owner, name: \$name) {
              id
              discussionCategories(first: 25) {
                nodes { id name }
              }
            }
          }
          '''
          owner, name = repo.split('/')
          result = subprocess.run(
              ['gh', 'api', 'graphql',
               '-f', f'query={query}',
               '-f', f'owner={owner}',
               '-f', f'name={name}'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f'Failed to query repo info: {result.stderr}')
              sys.exit(1)

          data = json.loads(result.stdout)
          repo_id = data['data']['repository']['id']
          categories = data['data']['repository']['discussionCategories']['nodes']
          cat = next((c for c in categories if c['name'] == category_name), None)
          if not cat:
              print(f'Discussion category \"{category_name}\" not found. Available: {[c[\"name\"] for c in categories]}')
              sys.exit(1)
          category_id = cat['id']
          print(f'Repo ID: {repo_id}, Category: {category_name} ({category_id})')

          manifests = '''${{ steps.new-transforms.outputs.manifests }}'''.strip().split('\n')

          for manifest_str in manifests:
              manifest_str = manifest_str.strip()
              if not manifest_str:
                  continue
              manifest = Path(manifest_str)
              if not manifest.exists():
                  continue

              meta = yaml.safe_load(manifest.read_text()) or {}
              slug = meta.get('name', manifest.parent.name)
              display_name = meta.get('display_name', slug)
              description = meta.get('description', '')
              version = meta.get('version', '')
              category = meta.get('category', '')
              input_types = ', '.join(meta.get('input_types', []))
              output_types = ', '.join(meta.get('output_types', []))
              author = meta.get('author', '')

              readme_path = manifest.parent / 'README.md'
              readme_content = readme_path.read_text() if readme_path.exists() else ''

              title = f'Transform: {display_name}'
              body = f'''## {display_name}

          **Slug:** \`{slug}\`
          **Version:** {version}
          **Category:** {category}
          **Author:** {author}

          **Input types:** {input_types}
          **Output types:** {output_types}

          {description}

          ---

          {readme_content}

          ---

          *React with a thumbs up or down to rate this transform. Leave a comment with questions, bug reports, or reviews.*
          '''

              print(f'Creating discussion for {display_name}...')
              mutation = '''
              mutation(\$repoId: ID!, \$catId: ID!, \$title: String!, \$body: String!) {
                createDiscussion(input: {repositoryId: \$repoId, categoryId: \$catId, title: \$title, body: \$body}) {
                  discussion { url }
                }
              }
              '''
              result = subprocess.run(
                  ['gh', 'api', 'graphql',
                   '-f', f'query={mutation}',
                   '-f', f'repoId={repo_id}',
                   '-f', f'catId={category_id}',
                   '-f', f'title={title}',
                   '-f', f'body={body}'],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f'  Failed: {result.stderr}')
              else:
                  url = json.loads(result.stdout)['data']['createDiscussion']['discussion']['url']
                  print(f'  Created: {url}')
          "
