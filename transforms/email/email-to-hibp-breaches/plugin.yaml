name: email-to-hibp-breaches
version: "1.0.0"
display_name: "Email to HIBP Breaches"
description: "Looks up an email address in Have I Been Pwned and creates an aggregated breach evidence document"
author: "OGI Team"
license: "AGPL-3.0"
category: "email"
input_types: ["EmailAddress"]
output_types: ["Document"]
min_ogi_version: "0.3.0"
verification_tier: "community"

tags: ["email", "hibp", "breaches", "leaks", "osint"]
author_github: "opengraphintel"
icon: "shield-alert"
color: "#ef4444"

python_dependencies:
  - "httpx>=0.28.1"

api_keys_required:
  - service: "hibp"
    description: "Have I Been Pwned API key"
    env_var: "HIBP_API_KEY"

transform_settings:
  - name: "hibp_api_key"
    display_name: "HIBP API Key"
    description: "API key for Have I Been Pwned account breach lookups"
    required: true
    field_type: "secret"
  - name: "timeout_seconds"
    display_name: "Timeout Seconds"
    description: "HTTP timeout for the HIBP request"
    default: "15"
    field_type: "integer"
    min_value: 5
    max_value: 30
  - name: "include_unverified"
    display_name: "Include Unverified"
    description: "Include breaches flagged as unverified"
    default: "true"
    field_type: "boolean"

permissions:
  network: true
  filesystem: false
  subprocess: false
