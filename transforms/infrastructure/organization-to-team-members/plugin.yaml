schema_version: 2
name: organization-to-team-members
version: "1.0.0"
display_name: "Organization to Team Members"
description: "Finds an organization's team pages and extracts up to 500 team members using OpenAI"
author: "OGI Team"
license: "AGPL-3.0"
category: "infrastructure"
input_types: ["Organization"]
output_types: ["Person"]
min_ogi_version: "0.3.0"
verification_tier: "official"

tags: ["organization", "team", "people", "openai", "scraping"]
author_github: "opengraphintel"
icon: "users"
color: "#0ea5e9"

python_dependencies:
  - "httpx>=0.28.1"

api_keys_required:
  - service: "openai"
    description: "OpenAI API key from https://platform.openai.com/api-keys"
    env_var: "OPENAI_API_KEY"

transform_settings:
  - name: "openai_api_key"
    display_name: "OpenAI API Key"
    description: "Required OpenAI API key used to extract team members"
    required: true
    field_type: "secret"
  - name: "openai_model"
    display_name: "OpenAI Model"
    description: "Model used for extraction"
    default: "gpt-4.1-mini"
    field_type: "select"
    options: ["gpt-4.1-mini", "gpt-4.1", "gpt-4o-mini", "gpt-4o"]
  - name: "max_members"
    display_name: "Max Members"
    description: "Maximum number of team members to return (1-500)"
    default: "500"
    field_type: "integer"
    min_value: 1
    max_value: 500

permissions:
  network: true
  filesystem: false
  subprocess: false
