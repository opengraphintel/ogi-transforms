name: ip-to-greynoise-quick-context
version: "1.0.0"
display_name: "IP to GreyNoise Quick Context"
description: "Enriches an IP address with GreyNoise community quick context"
author: "OGI Team"
license: "AGPL-3.0"
category: "ip"
input_types: ["IPAddress"]
output_types: ["IPAddress"]
min_ogi_version: "0.3.0"
verification_tier: "community"

tags: ["ip", "greynoise", "threat-intel", "noise", "riot"]
author_github: "opengraphintel"
icon: "radar"
color: "#1d4ed8"

python_dependencies:
  - "httpx>=0.28.1"

transform_settings:
  - name: "timeout_seconds"
    display_name: "Timeout Seconds"
    description: "HTTP timeout for the GreyNoise community lookup"
    default: "10"
    field_type: "integer"
    min_value: 3
    max_value: 30

permissions:
  network: true
  filesystem: false
  subprocess: false