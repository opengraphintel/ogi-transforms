name: ip-to-ipinfo-profile
version: "1.0.0"
display_name: "IP to IPinfo Profile"
description: "Enriches an IP address with IPinfo profile data"
author: "OGI Team"
license: "AGPL-3.0"
category: "ip"
input_types: ["IPAddress"]
output_types: ["IPAddress"]
min_ogi_version: "0.3.0"
verification_tier: "community"

tags: ["ip", "ipinfo", "geolocation", "asn", "enrichment"]
author_github: "opengraphintel"
icon: "map"
color: "#2563eb"

python_dependencies:
  - "httpx>=0.28.1"

api_keys_required:
  - service: "ipinfo"
    description: "IPinfo API token from https://ipinfo.io/"
    env_var: "IPINFO_API_KEY"

transform_settings:
  - name: "timeout_seconds"
    display_name: "Timeout Seconds"
    description: "HTTP timeout for the IPinfo request"
    default: "10"
    field_type: "integer"
    min_value: 3
    max_value: 30

permissions:
  network: true
  filesystem: false
  subprocess: false