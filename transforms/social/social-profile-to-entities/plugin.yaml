name: social-profile-to-entities
version: "1.0.0"
display_name: "Social Profile to Entities"
description: "Fetches a public social profile URL from a SocialMedia entity and extracts observed identifiers"
author: "OGI Team"
license: "AGPL-3.0"
category: "social"
input_types: ["SocialMedia"]
output_types: ["Person", "Username", "EmailAddress", "URL", "Domain"]
min_ogi_version: "0.3.0"
verification_tier: "community"

tags: ["social", "profile", "entity", "extraction", "osint"]
author_github: "opengraphintel"
icon: "badge-info"
color: "#14b8a6"

python_dependencies:
  - "httpx>=0.28.1"

transform_settings:
  - name: "timeout_seconds"
    display_name: "Timeout Seconds"
    description: "Per-request timeout for fetching the social profile page"
    default: "15"
    field_type: "integer"
    min_value: 3
    max_value: 60
  - name: "max_results"
    display_name: "Max Results"
    description: "Maximum extracted identifiers to return"
    default: "30"
    field_type: "integer"
    min_value: 1
    max_value: 200
  - name: "max_content_chars"
    display_name: "Max Content Chars"
    description: "Maximum HTML/text characters to inspect during extraction"
    default: "40000"
    field_type: "integer"
    min_value: 1000
    max_value: 200000
  - name: "same_host_links_only"
    display_name: "Same Host Links Only"
    description: "Restrict extracted links to the same host as the input profile URL"
    default: "false"
    field_type: "boolean"

permissions:
  network: true
  filesystem: false
  subprocess: false