name: username-maigret
version: "1.1.0"
display_name: "Username OSINT (Maigret Adoption)"
description: "Finds claimed usernames using an OGI-native checker with a vendored Maigret site database"
author: "OGI Team"
license: "AGPL-3.0"
category: "social"
input_types: ["SocialMedia", "Person", "Username"]
output_types: ["SocialMedia", "URL"]
min_ogi_version: "0.3.0"
verification_tier: "community"

tags: ["social", "username", "osint", "enumeration", "maigret", "adoption"]
author_github: "opengraphintel"
icon: "users"
color: "#0f766e"

python_dependencies:
  - "httpx>=0.28.1"

transform_settings:
  - name: "top_sites"
    display_name: "Top Sites"
    description: "Maximum number of ranked sites from the vendored Maigret database to query"
    default: "200"
    field_type: "integer"
    min_value: 10
    max_value: 1000
  - name: "include_disabled_sites"
    display_name: "Include Disabled Sites"
    description: "Include sites that the vendored Maigret database marks as disabled"
    default: "false"
    field_type: "boolean"
  - name: "timeout_seconds"
    display_name: "Timeout Seconds"
    description: "Per-request timeout used by the adoption checker"
    default: "15"
    field_type: "integer"
    min_value: 3
    max_value: 60
  - name: "max_results"
    display_name: "Max Results"
    description: "Maximum number of claimed accounts to return"
    default: "100"
    field_type: "integer"
    min_value: 1
    max_value: 500

permissions:
  network: true
  filesystem: false
  subprocess: false
