name: username-user-scanner
version: "1.0.0"
display_name: "Username OSINT (user-scanner)"
description: "Finds username presence across many platforms using the user-scanner library"
author: "OGI Team"
license: "AGPL-3.0"
category: "social"
input_types: ["SocialMedia", "Person"]
output_types: ["SocialMedia", "URL"]
min_ogi_version: "0.3.0"
verification_tier: "community"

tags: ["social", "username", "osint", "enumeration", "user-scanner"]
author_github: "opengraphintel"
icon: "users"
color: "#f97316"

python_dependencies:
  - "user-scanner>=1.3.3"

transform_settings:
  - name: "scan_scope"
    display_name: "Scan Scope"
    description: "Category to scan. 'all' scans all user_scan categories."
    default: "all"
    field_type: "select"
    options: ["all", "social", "dev", "creator", "community", "gaming"]
  - name: "only_found"
    display_name: "Only Found"
    description: "Only include found platforms in output entities"
    default: "true"
    field_type: "boolean"
  - name: "max_results"
    display_name: "Max Results"
    description: "Maximum number of found accounts to return"
    default: "100"
    field_type: "integer"
    min_value: 1
    max_value: 500

permissions:
  network: true
  filesystem: false
  subprocess: false
